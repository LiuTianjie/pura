    <text x="84" y="207" fill="#d6f7ef" font-size="34" font-weight="800" letter-spacing="0">LAN Android device mirroring</text>
    <text x="86" y="244" fill="#8cb1ad" font-size="18" font-weight="650" letter-spacing="0">Hub + agents for local device walls, streams, and fast team debugging.</text>
