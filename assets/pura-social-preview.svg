    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#173139" stroke-width="1" opacity="0.42"/>
    </pattern>
    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
      .mono { font-family: "SF Mono", "Menlo", "Consolas", monospace; }
      .label { fill: #b6d8d5; font-size: 17px; font-weight: 700; letter-spacing: 0; }
      .tiny { fill: #86aaa7; font-size: 12px; font-weight: 700; letter-spacing: 0; }
      .line { fill: none; stroke: #54e6d0; stroke-width: 3; stroke-linecap: round; stroke-dasharray: 2 11; opacity: 0.72; }
      .wire { fill: none; stroke: #315961; stroke-width: 2; stroke-linecap: round; opacity: 0.72; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
