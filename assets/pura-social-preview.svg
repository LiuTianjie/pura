<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071317"/>
      <stop offset="0.52" stop-color="#0b2025"/>
      <stop offset="1" stop-color="#0e171b"/>
    </linearGradient>
    <linearGradient id="hub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fffb"/>
      <stop offset="0.52" stop-color="#dff8ef"/>
      <stop offset="1" stop-color="#aee6d7"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132a32"/>
      <stop offset="1" stop-color="#071115"/>
    </linearGradient>
    <linearGradient id="phoneGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c3c45"/>
      <stop offset="0.62" stop-color="#0a1a20"/>
      <stop offset="1" stop-color="#05090c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="0.54" stop-color="#8bffd0"/>
      <stop offset="1" stop-color="#f7c948"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
